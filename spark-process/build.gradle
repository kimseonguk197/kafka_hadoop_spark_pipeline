plugins {
    id 'java'
}

group = 'com.example'
version = '1.0'

repositories {
    mavenCentral()
}

ext {
    sparkVersion = '3.1.1'
    scalaBinaryVersion = '2.12'
}

dependencies {
    // spark-master 컨테이너가 실행 시점에 자체 Spark jar를 제공하므로 compileOnly로 컴파일에만 사용
    compileOnly "org.apache.spark:spark-core_${scalaBinaryVersion}:${sparkVersion}"
    compileOnly "org.apache.spark:spark-sql_${scalaBinaryVersion}:${sparkVersion}"
}

// 로컬 JDK(21)로 컴파일하되, 컨테이너의 Spark 3.1.1이 실행 가능한 Java 8 바이트코드로 target
tasks.withType(JavaCompile).configureEach {
    options.release = 8
}

jar {
    archiveBaseName = 'spark-examples'
    archiveVersion = ''
}
